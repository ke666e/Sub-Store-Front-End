name: Sync Tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream repo
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_URL=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')

          if [ -z "$UPSTREAM_URL" ]; then
            echo "This repository does not seem to be a fork, or parent repo was not found."
            exit 1
          fi

          echo "Upstream URL: $UPSTREAM_URL"
          echo "url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"

      - name: Sync Tags from Upstream
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${{ steps.upstream.outputs.url }}"

          git fetch upstream '+refs/tags/*:refs/tags/*'
          git push origin '+refs/tags/*:refs/tags/*'
